server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA; fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service. The trailing slash on
    # proxy_pass strips the /api prefix: /api/query -> http://ragforge:8000/query.
    location /api/ {
        proxy_pass http://ragforge:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Required so Server-Sent Events (the streaming answer) flush immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
    }
}
