services:
  ragforge:
    build: .
    image: ragforge:latest
    # The API is reached by the browser through the web service at /api, so it
    # does not need to be published. Uncomment to expose /docs directly.
    # ports:
    #   - "8000:8000"
    expose:
      - "8000"
    environment:
      # Runs offline by default. Uncomment and set keys to use real providers.
      RAGFORGE_LLM_PROVIDER: mock
      RAGFORGE_EMBEDDING_PROVIDER: hash
      RAGFORGE_VECTORSTORE: memory
      RAGFORGE_DATA_DIR: /data
      # RAGFORGE_LLM_PROVIDER: anthropic
      # RAGFORGE_ANTHROPIC_API_KEY: ${RAGFORGE_ANTHROPIC_API_KEY}
    volumes:
      - ragforge_data:/data

  web:
    build: ./frontend
    image: ragforge-web:latest
    depends_on:
      - ragforge
    ports:
      - "8080:80"

volumes:
  ragforge_data:
